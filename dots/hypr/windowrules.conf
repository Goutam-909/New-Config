#
# Opacity rules (new syntax)

############################
# Core apps
############################
windowrule = opacity 0.60 0.30, match:class ^io.bassi.Amberol$
windowrule = opacity 1 0.92, match:class ^Thunar$

#windowrule = opacity 0.99 0.88, match:class ^firefox$
windowrule = opacity 0.90 0.90, match:class ^Google-chrome$
windowrule = opacity 0.90 0.80, match:class ^zen$
windowrule = opacity 0.90 0.90, match:class ^Brave-browser$

############################
# Code / IDEs
############################
windowrule = opacity 0.80 0.80, match:class ^code-oss$
windowrule = opacity 0.80 0.80, match:class ^([Cc]ode)$
windowrule = opacity 0.80 0.80, match:class ^code-url-handler$
windowrule = opacity 0.80 0.80, match:class ^code-insiders-url-handler$

############################
# Terminals & file managers
############################
#windowrule = opacity 0.80 0.70, match:class ^kitty$
#windowrule = opacity 0.90 0.80, match:class ^org.kde.dolphin$
windowrule = opacity 0.80 0.80, match:class ^org.kde.ark$
#windowrule = opacity 0.80 0.70, match:class ^thunar$
windowrule = opacity 1 0.92, match:class ^org.gnome.Nautilus$
############################
# Config / appearance tools
############################
windowrule = opacity 0.80 0.80, match:class ^nwg-look$
windowrule = opacity 0.80 0.80, match:class ^qt5ct$
windowrule = opacity 0.80 0.80, match:class ^qt6ct$
windowrule = opacity 0.80 0.80, match:class ^kvantummanager$

#windowrule = opacity 0.80 0.80, match:title ^(Uchiha Settings)$
############################
# Audio / network / auth
############################
windowrule = opacity 0.80 0.70, match:class ^org.pulseaudio.pavucontrol$
windowrule = opacity 0.80 0.70, match:class ^blueman-manager$
windowrule = opacity 0.80 0.70, match:class ^nm-applet$
windowrule = opacity 0.80 0.70, match:class ^nm-connection-editor$
windowrule = opacity 0.80 0.70, match:class ^org.kde.polkit-kde-authentication-agent-1$
windowrule = opacity 0.80 0.70, match:class ^polkit-gnome-authentication-agent-1$

############################
# Portals
############################
windowrule = opacity 0.80 0.70, match:class ^org.freedesktop.impl.portal.desktop.gtk$
windowrule = opacity 0.80 0.70, match:class ^org.freedesktop.impl.portal.desktop.hyprland$

############################
# Media / music
############################
windowrule = opacity 0.70 0.70, match:class ^steamwebhelper$
#windowrule = opacity 0.70 0.70, match:class ^([Ss]potify)$
#windowrule = opacity 0.70 0.70, match:initial_title ^Spotify Free$
windowrule = opacity 0.70 0.70, match:initial_title ^Spotify Premium$

############################
# GTK / Qt apps
############################
windowrule = opacity 0.90 0.90, match:class ^com.github.rafostar.Clapper$
windowrule = opacity 0.80 0.80, match:class ^com.github.tchx84.Flatseal$
windowrule = opacity 0.80 0.80, match:class ^hu.kramo.Cartridges$
windowrule = opacity 0.80 0.80, match:class ^com.obsproject.Studio$
windowrule = opacity 0.80 0.80, match:class ^gnome-boxes$
windowrule = opacity 0.80 0.80, match:class ^vesktop$
windowrule = opacity 0.80 0.80, match:class ^discord$
windowrule = opacity 0.80 0.80, match:class ^WebCord$
windowrule = opacity 0.80 0.80, match:class ^ArmCord$
windowrule = opacity 0.80 0.80, match:class ^app.drey.Warp$
windowrule = opacity 0.80 0.80, match:class ^net.davidotek.pupgui2$
windowrule = opacity 0.80 0.80, match:class ^yad$
windowrule = opacity 0.80 0.80, match:class ^Signal$
windowrule = opacity 0.80 0.80, match:class ^io.github.alainm23.planify$
windowrule = opacity 0.80 0.80, match:class ^io.gitlab.theevilskeleton.Upscaler$
windowrule = opacity 0.80 0.80, match:class ^com.github.unrud.VideoDownloader$
windowrule = opacity 0.80 0.80, match:class ^io.gitlab.adhami3310.Impression$
windowrule = opacity 0.80 0.80, match:class ^io.missioncenter.MissionCenter$
windowrule = opacity 0.80 0.80, match:class ^io.github.flattool.Warehouse$

############################
# YouTube Music PWA (Brave)
############################
windowrule = opacity 0.80 0.80, match:title ^(YouTube Music)$

############################
# Misc
############################
windowrule = opacity 0.80 0.70, match:class ^rmpc-term$
#windowrule = opacity 0.80 0.70, match:class ^kitty-float$
windowrule = opacity 0.70 0.60, match:class ^org.kde.plasmawindowed$

############################
# Hide KDE Wayland compositor
############################
windowrule = workspace special:kwin_hidden silent, match:title ^KDE Wayland Compositor.*$
windowrule = float on, match:title ^KDE Wayland Compositor.*$
windowrule = size 1 1, match:title ^KDE Wayland Compositor.*$
windowrule = move -9999 -9999, match:title ^KDE Wayland Compositor.*$
windowrule = no_initial_focus on, match:title ^KDE Wayland Compositor.*$
windowrule = no_focus on, match:title ^KDE Wayland Compositor.*$
